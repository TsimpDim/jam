<clr-modal [(clrModalOpen)]="isOpen" [clrModalClosable]="false">
  <h3 class="modal-title" *ngIf="application === null">Add Job Application</h3>
  <h3 class="modal-title" *ngIf="application !== null">Edit Job Application</h3>

  <div class="modal-body">
    <clr-alert [clrAlertClosable]="false" [clrAlertType]="'danger'" *ngIf="errorMessage">
      <clr-alert-item>
        <span class="alert-text">
          {{ errorMessage }}
        </span>
      </clr-alert-item>
    </clr-alert>

    <form class="clr-form clr-form-horizontal" [formGroup]="jobAppForm">
      <div class="clr-form-control">
        <clr-input-container>
          <label><cds-icon shape="organization"></cds-icon> Company *</label>
          <input
            clrInput
            type="text"
            name="company"
            formControlName="company"
            placeholder="Hooli"
          />
          <clr-control-error>Company is required</clr-control-error>
        </clr-input-container>
      </div>

      <div class="clr-form-control">
        <clr-select-container>
          <label><cds-icon shape="lightbulb"></cds-icon> Lead</label>
          <select clrSelect name="lead" formControlName="lead">
            <option [ngValue]="null">No Lead</option>
            <option *ngFor="let lead of leads" [ngValue]="lead.id">
              {{ lead.company }} - {{ lead.role }}
            </option>
          </select>
        </clr-select-container>
      </div>

      <div class="clr-form-control">
        <clr-input-container>
          <label><cds-icon shape="id-badge"></cds-icon> Role *</label>
          <input
            clrInput
            type="text"
            name="role"
            formControlName="role"
            placeholder="Software Engineer"
          />
          <clr-control-error>Role is required</clr-control-error>
        </clr-input-container>
      </div>

      <div class="clr-form-control">
        <clr-input-container>
          <label><cds-icon shape="map-marker"></cds-icon> Location</label>
          <input
            clrInput
            type="text"
            name="location"
            formControlName="location"
            placeholder="San Francisco"
          />
        </clr-input-container>
      </div>

      <div class="clr-form-control">
        <clr-input-container>
          <label><cds-icon shape="info-standard"></cds-icon> Applied Through</label>
          <input
            clrInput
            type="text"
            name="appliedThrough"
            formControlName="appliedThrough"
            placeholder="LinkedIn"
          />
        </clr-input-container>
      </div>

      <div class="clr-form-control">
        <clr-input-container>
          <label><cds-icon shape="link"></cds-icon> External Link</label>
          <input
            clrInput
            type="text"
            name="externalLink"
            formControlName="externalLink"
            placeholder="https://..."
          />
        </clr-input-container>
      </div>

      <div class="clr-form-control">
        <clr-textarea-container>
          <label><cds-icon shape="note"></cds-icon> Notes</label>
          <textarea
            clrTextarea
            name="notes"
            formControlName="notes"
            placeholder="Great first impression."
          ></textarea>
        </clr-textarea-container>
      </div>

      <div class="clr-form-control">
        <clr-date-container>
          <label><cds-icon shape="calendar"></cds-icon> Date</label>
          <input clrDate type="date" name="date" formControlName="date" />
        </clr-date-container>
      </div>

      <div class="clr-form-control">
        <clr-select-container>
          <label><cds-icon shape="block"></cds-icon> Group *</label>
          <select clrSelect name="group" formControlName="group">
            <option
              *ngFor="let group of groups; let i = index"
              [value]="group.id"
            >
              {{ group.name }}
            </option>
          </select>
          <clr-control-error>Group is required</clr-control-error>
        </clr-select-container>
      </div>

      <div class="clr-form-control" *ngIf="application === null">
        <clr-select-container>
          <label><cds-icon shape="flag"></cds-icon> Initial Step *</label>
          <select clrSelect name="initialStep" formControlName="initialStep">
            <option
              *ngFor="let step of initialSteps; let i = index"
              [value]="step.id"
            >
              {{ step.name }}
            </option>
          </select>
          <clr-control-error>Initial Step is required</clr-control-error>
        </clr-select-container>
      </div>
    </form>
  </div>

  <div class="modal-footer">
    <clr-spinner
      *ngIf="loading"
      [clrMedium]="true"
      [clrInline]="true"
      [clrInverse]="true"
    ></clr-spinner>
    <button
      type="button"
      class="btn btn-danger-outline"
      (click)="deleteJobApp(application.id)"
      *ngIf="application !== null"
    >
      Delete
    </button>
    <button type="button" class="btn btn-outline" (click)="closeModal()">
      Cancel
    </button>
    <button type="submit" class="btn btn-primary" (click)="submitJobAppForm()">
      Submit
    </button>
  </div>
</clr-modal>
